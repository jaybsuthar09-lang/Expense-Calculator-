<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #9333ea);
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
  font-size: 26px;
  background: linear-gradient(90deg, #38bdf8, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 16px;
  padding: 15px;
  margin: 12px 0;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.input-group {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.input-group input,
.input-group select,
.input-group button {
  flex: 1 1 100%;
}

@media (min-width: 600px) {
  .input-group input,
  .input-group select {
    flex: 1;
  }
  .input-group button {
    flex: 0.5;
  }
}

input, select {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #9333ea);
  color: white;
  cursor: pointer;
}

.expense {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 10px;
  margin: 5px 0;
}

.error {
  color: #f87171;
}

#warning {
  color: #facc15;
  font-weight: bold;
}

canvas {
  width: 100% !important;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Expense Tracker</h1>

<!-- ✅ INPUT CARD -->
<div class="card">
  <div class="input-group">
    <input id="desc" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount" min="1">
    
    <select id="category">
      <option>🍔 Food</option>
      <option>🚌 Transport</option>
      <option>🛍️ Shopping</option>
      <option>🎬 Entertainment</option>
      <option>📦 Other</option>
    </select>

    <button onclick="addExpense()">Add</button>
  </div>

  <p id="inputError" class="error"></p>
</div>

<!-- BUDGET -->
<div class="card">
  🎯 Monthly Budget: ₹
  <input id="budget" type="number">
  <button onclick="setBudget()">Set</button>
  <p id="budgetStatus"></p>
</div>

<!-- SUMMARY -->
<div class="card">
  <h3>📊 Summary</h3>
  <p id="total"></p>
  <p id="warning"></p>
</div>

<!-- TIPS -->
<div class="card">
  <h3>💡 Suggestions</h3>
  <p id="tips"></p>
</div>

<!-- LIST -->
<div class="card">
  <h3>📅 Expenses</h3>
  <div id="list"></div>
</div>

<!-- EXPORT -->
<div class="card">
  <button onclick="exportCSV()">📤 Export CSV</button>
</div>

<!-- CHARTS -->
<div class="card">
  <canvas id="pieChart"></canvas>
</div>

<div class="card">
  <canvas id="lineChart"></canvas>
</div>

</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let budget = localStorage.getItem("budget") || 0;

function addExpense() {
  const desc = descInput.value;
  const amount = +amountInput.value;
  const category = categoryInput.value;

  if (!desc || !amount) {
    document.getElementById("inputError").innerText = "⚠️ Please fill all fields";
    return;
  }

  document.getElementById("inputError").innerText = "";

  expenses.push({ desc, amount, category, date: new Date().toISOString() });

  descInput.value = "";
  amountInput.value = "";

  save();
}

function deleteExpense(i) {
  expenses.splice(i, 1);
  save();
}

function setBudget() {
  budget = +document.getElementById("budget").value;
  localStorage.setItem("budget", budget);
  render();
}

function save() {
  localStorage.setItem("expenses", JSON.stringify(expenses));
  render();
}

function render() {
  const list = document.getElementById("list");

  list.innerHTML = "";

  let total = 0, categories = {}, daily = {};

  expenses.forEach((e, i) => {
    total += e.amount;
    categories[e.category] = (categories[e.category] || 0) + e.amount;

    let day = e.date.slice(0,10);
    daily[day] = (daily[day] || 0) + e.amount;

    list.innerHTML += `
      <div class="expense">
        ${e.desc} - ₹${e.amount}
        <button onclick="deleteExpense(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerHTML =
    "💰 Total: <span style='color:#38bdf8;font-size:20px;'>₹" + total + "</span>";

  document.getElementById("warning").innerText =
    total > budget && budget > 0 ? "⚠️ Over budget!" : "";

  document.getElementById("budgetStatus").innerText = "Budget: ₹" + budget;

  generateTips(categories);
  drawCharts(categories, daily);
}

function generateTips(cat) {
  let tips = "";

  if ((cat["🍔 Food"] || 0) > 2500) tips += "Reduce eating out\n";
  if ((cat["🛍️ Shopping"] || 0) > 2000) tips += "Avoid impulse buying\n";
  if ((cat["🎬 Entertainment"] || 0) > 1500) tips += "Limit subscriptions\n";

  document.getElementById("tips").innerText = tips || "You're doing great!";
}

let pieChart, lineChart;

function drawCharts(cat, daily) {
  if (pieChart) pieChart.destroy();
  if (lineChart) lineChart.destroy();

  pieChart = new Chart(pieChart = document.getElementById("pieChart"), {
    type: 'pie',
    data: { labels: Object.keys(cat), datasets: [{ data: Object.values(cat) }] }
  });

  lineChart = new Chart(lineChart = document.getElementById("lineChart"), {
    type: 'line',
    data: { labels: Object.keys(daily), datasets: [{ data: Object.values(daily) }] }
  });
}

function exportCSV() {
  let csv = "Desc,Amount,Category,Date\n";
  expenses.forEach(e => csv += `${e.desc},${e.amount},${e.category},${e.date}\n`);

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv]));
  a.download = "expenses.csv";
  a.click();
}

const descInput = document.getElementById("desc");
const amountInput = document.getElementById("amount");
const categoryInput = document.getElementById("category");

render();
</script>

</body>
</html>
