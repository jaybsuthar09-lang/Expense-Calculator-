<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#0f172a,#1e3a8a,#9333ea);
  color: white;
}

/* Container */
.container {
  padding: 15px;
  padding-bottom: 100px;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 16px;
  padding: 15px;
  margin: 10px 0;
}

/* Floating Button */
.fab {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: #3b82f6;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}

/* Bottom Nav */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

/* Modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
}

/* Inputs */
input, select {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 8px;
}

/* Expense */
.expense {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  margin: 5px 0;
  border-radius: 8px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 150px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Expense App</h2>

<div class="card">
  <h3 id="total"></h3>
  <p id="warning"></p>
</div>

<div class="card">
  <h3>💡 Tips</h3>
  <p id="tips"></p>
</div>

<div class="card">
  <h3>Expenses</h3>
  <div id="list"></div>
</div>

<canvas id="pieChart"></canvas>

</div>

<!-- Floating Button -->
<div class="fab" onclick="openModal()">+</div>

<!-- Bottom Nav -->
<div class="nav">
  <div>🏠</div>
  <div>📊</div>
  <div>⚙️</div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <input id="desc" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">
    <select id="category">
      <option>🍔 Food</option>
      <option>🚌 Transport</option>
      <option>🛍️ Shopping</option>
      <option>🎬 Entertainment</option>
    </select>
    <button onclick="addExpense()">Add Expense</button>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">Added!</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let budget = 5000;

function openModal() {
  modal.style.display = "flex";
}

function addExpense() {
  const desc = document.getElementById("desc").value;
  const amount = +document.getElementById("amount").value;
  const category = document.getElementById("category").value;

  if (!desc || !amount) return;

  expenses.push({desc,amount,category});
  localStorage.setItem("expenses", JSON.stringify(expenses));

  modal.style.display = "none";

  showToast();
  render();
}

function showToast() {
  const t = document.getElementById("toast");
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

function render() {
  let total = 0;
  let cat = {};

  list.innerHTML = "";

  expenses.forEach((e,i)=>{
    total += e.amount;
    cat[e.category] = (cat[e.category]||0)+e.amount;

    list.innerHTML += `
      <div class="expense">
        ${e.desc} ₹${e.amount}
      </div>
    `;
  });

  totalEl.innerText = "₹"+total;

  if(total > budget) warning.innerText = "Over budget!";
  else warning.innerText = "";

  tips.innerText = total > 3000 ? "Try to save more" : "Good job";

  drawChart(cat);
}

let chart;
function drawChart(cat){
  if(chart) chart.destroy();
  chart = new Chart(pieChart,{
    type:'pie',
    data:{labels:Object.keys(cat),datasets:[{data:Object.values(cat)}]}
  });
}

render();
</script>

</body>
</html>
